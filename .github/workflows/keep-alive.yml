name: keep-alive

# Render's free plan spins the API container down after ~15 min of
# inactivity. Cold-start adds 30-60s to the next request, which makes
# the SPA appear to hang after the bundle finishes loading. Ping the
# health endpoint on a short cron so the server never goes cold during
# the day. The 9-min cadence stays comfortably under the 15-min idle
# threshold even when GitHub's scheduler runs a couple of minutes late.
on:
  schedule:
    - cron: '*/9 * * * *'
  workflow_dispatch:

concurrency:
  group: keep-alive
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping /api/health
        run: |
          set -euo pipefail
          URL="${API_URL:-https://stakepoint-api.onrender.com/api/health}"
          # --max-time gives Render up to 90s to wake on a cold start.
          # --retry-connrefused covers the brief window when the
          # container is restarting between TCP listen and HTTP ready.
          curl --fail \
               --silent \
               --show-error \
               --max-time 90 \
               --retry 3 \
               --retry-delay 5 \
               --retry-connrefused \
               -o /dev/null \
               -w 'HTTP %{http_code} in %{time_total}s\n' \
               "$URL"
        env:
          API_URL: ${{ vars.API_URL }}
