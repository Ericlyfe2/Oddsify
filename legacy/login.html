<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign in — STAKEPOINT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,800&family=JetBrains+Mono:wght@500;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0d0c;
    --surface: #131a18;
    --line: rgba(255, 255, 255, 0.06);
    --line-strong: rgba(255, 255, 255, 0.12);
    --text: #ecf0ee;
    --text-soft: #a0a8a4;
    --text-dim: #5d6764;
    --accent: #c5ff3d;
    --accent-hot: #ff4d3d;
    --r: 10px;
    --r-lg: 18px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: 'Bricolage Grotesque', sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  body {
    background:
      radial-gradient(900px 500px at 85% -10%, rgba(197, 255, 61, 0.08), transparent 60%),
      radial-gradient(700px 400px at -10% 30%, rgba(106, 208, 255, 0.05), transparent 60%),
      var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 20px;
  }
  a { color: inherit; text-decoration: none; }
  .back {
    position: absolute;
    top: 24px;
    left: 28px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-soft);
    transition: color .2s;
  }
  .back:hover { color: var(--accent); }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 800;
    font-size: 22px;
    letter-spacing: -0.02em;
    margin-bottom: 40px;
  }
  .logo-mark {
    width: 32px; height: 32px;
    background: var(--accent);
    border-radius: 8px;
    display: grid; place-items: center;
    color: #000;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 16px;
    transform: rotate(-6deg);
    box-shadow: 0 0 20px rgba(197, 255, 61, 0.3);
  }
  .logo-mark span { transform: rotate(6deg); }
  .logo-text em {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-weight: 400;
    color: var(--accent);
  }
  .card {
    width: 100%;
    max-width: 400px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--r-lg);
    padding: 32px 28px 28px;
    box-shadow: 0 30px 60px rgba(0,0,0,0.4);
  }
  .card h1 {
    font-size: 24px;
    font-weight: 800;
    letter-spacing: -0.02em;
    margin-bottom: 8px;
  }
  .card .sub {
    font-size: 14px;
    color: var(--text-soft);
    margin-bottom: 28px;
    line-height: 1.5;
  }
  label {
    display: block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 8px;
  }
  input {
    width: 100%;
    padding: 12px 14px;
    border-radius: var(--r);
    border: 1px solid var(--line);
    background: rgba(0,0,0,0.25);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    margin-bottom: 18px;
    outline: none;
    transition: border-color .15s;
  }
  input:focus { border-color: var(--accent); }
  .err {
    font-size: 13px;
    color: var(--accent-hot);
    margin-bottom: 14px;
    min-height: 1.2em;
  }
  button.primary {
    width: 100%;
    margin-top: 8px;
    padding: 14px;
    border: 0;
    border-radius: var(--r);
    background: var(--accent);
    color: #000;
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 800;
    font-size: 14px;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all .15s;
  }
  button.primary:hover {
    background: #d4ff5a;
    box-shadow: 0 12px 32px rgba(197, 255, 61, 0.35);
  }
  .foot {
    margin-top: 22px;
    text-align: center;
    font-size: 13px;
    color: var(--text-dim);
  }
  .foot a { color: var(--accent); font-weight: 600; }
  .foot a:hover { text-decoration: underline; }
</style>
</head>
<body>
  <a class="back" href="stakepoint.html">← Sports</a>
  <div class="logo">
    <div class="logo-mark"><span>S</span></div>
    <div class="logo-text">stake<em>point</em></div>
  </div>
  <div class="card">
    <h1>Sign in</h1>
    <p class="sub">Use your phone or email like on MSport or SportyBet. Demo only — no account is created.</p>
    <form id="login-form" novalidate>
      <label for="email">Phone or email</label>
      <input id="email" name="email" type="text" autocomplete="username" placeholder="233… or you@email.com" required />
      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" placeholder="••••••••" required />
      <div class="err" id="login-err" aria-live="polite"></div>
      <button type="submit" class="primary">Sign in</button>
    </form>
    <p class="foot">New here? <a href="stakepoint.html">Back to lobby</a></p>
  </div>
<script>
(function () {
  const p = new URLSearchParams(location.search);
  if (p.get('logout') === '1') {
    sessionStorage.removeItem('sp_auth');
    sessionStorage.removeItem('sp_email');
  }
  const form = document.getElementById('login-form');
  const err = document.getElementById('login-err');
  form.addEventListener('submit', function (e) {
    e.preventDefault();
    err.textContent = '';
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    if (!email || !password) {
      err.textContent = 'Enter your phone or email and password.';
      return;
    }
    sessionStorage.setItem('sp_auth', '1');
    sessionStorage.setItem('sp_email', email);
    window.location.href = 'stakepoint.html';
  });
})();
</script>
</body>
</html>
