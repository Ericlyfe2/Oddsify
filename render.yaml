services:
  - type: web
    name: stakepoint-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://oddsify-client.vercel.app,https://stakepoint-client.vercel.app
      # Also trust this Vercel project's preview deploys (oddsify-client-*.vercel.app)
      - key: CORS_ALLOW_VERCEL
        value: oddsify-client
      - key: ODDS_API_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
