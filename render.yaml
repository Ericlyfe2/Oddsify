services:
  - type: web
    name: oddsify-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      # "Always logged in" session pair. Access tokens are valid for 30 days;
      # refresh tokens for 10 years and rotate on every /api/auth/refresh call,
      # so an active user effectively never has to re-authenticate. Tighten
      # only if you need shorter sessions for staff devices.
      - key: JWT_ACCESS_TTL
        value: "30d"
      - key: JWT_REFRESH_TTL
        value: "3650d"
      - key: CORS_ORIGIN
        value: https://oddsify-client.vercel.app
      # Also trust this Vercel project's preview deploys (oddsify-client-*.vercel.app)
      - key: CORS_ALLOW_VERCEL
        value: oddsify-client
      # Neon Postgres connection string. Set this in the Render dashboard
      # using the "Pooled connection" URL from the Neon project (must
      # include `?sslmode=require`). When unset, the API falls back to
      # ephemeral JSON files under server/data — fine for local dev but
      # wipes every user/account on each Render restart.
      - key: DATABASE_URL
        sync: false
      - key: ODDS_API_KEY
        sync: false
      # Free tier is 500 calls/month (~16/day). Each fetch hits 3 sport keys,
      # so 15/day = ~5 cycles/day fits the quota. Raise on paid plans.
      - key: ODDS_API_DAILY_BUDGET
        value: "15"
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: RAPIDAPI_FOOTBALL_KEY
        sync: false
      - key: RAPIDAPI_FOOTBALL_HOST
        value: free-api-live-football-data.p.rapidapi.com
